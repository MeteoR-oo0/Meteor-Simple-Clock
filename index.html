<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Meteor Simple Clock</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">


</head>
<body>
  <div id="background-image"></div>
  <div id="background-overlay"></div>
  <div id="app-wrapper">
    <div id="app-content">
      <div id="date">--</div>
      <div class="divider">
        <div class="second-bar" id="secondBar"></div>
      </div>

      <div id="clock">
        <span id="hour">--</span>
        <span class="colon" id="colon">
          <div class="dot"></div>
          <div class="dot"></div>
        </span>
        <span id="minute">--</span>
        <span id="ampm"></span>
      </div>
      <div class="status-block">
        <div class="status-item">
          <div class="temp" id="cpuTemp">--</div>
          <div class="label">CPU</div>
        </div>
        <div class="status-item">
          <div class="temp" id="gpuTemp">--</div>
          <div class="label">GPU</div>
        </div>
        <div class="status-item">
          <div class="temp" id="liqTemp">--</div>
          <div class="label">LIQ</div>
        </div>
      </div>
    </div>
  </div>

  <div id="config-ui" style="display: none;">

  <!-- ===== 文字 ===== -->
  <h3 class="cfg-h">文字</h3>

  <div>
    <label>日付の表記:</label>
    <select id="dateFormat">
      <option value="M/D ddd">M/D ddd（例: 9/9 Mon）</option>
      <option value="YYYY/M/D ddd">YYYY/M/D ddd（例: 2025/9/9 Tue）</option>
      <option value="D.M ddd">D.M ddd（例: 9.9 Tue）</option>
      <option value="ddd, MMM D">ddd, MMM D（例: Tue, Sep 9）</option>
      <option value="OFF">非表示</option>
    </select>
  </div>


  <div>
    <label>フォント選択:</label>
    <select id="fontSelector">
      <option value="'Press Start 2P', monospace">Press Start 2P</option>
      <option value="'Montserrat', sans-serif">Montserrat</option>
      <option value="'Doto', sans-serif">Doto</option>
      <option value="'Major Mono Display', monospace">Major Mono Display</option>
      <option value="'Orbitron', sans-serif">Orbitron</option>
      <option value="'Roboto', sans-serif">Roboto</option>
      <option value="'Comfortaa', sans-serif">Comfortaa</option>
      <option value="'Racing Sans One', sans-serif">Racing Sans One</option>
      <option value="'Abril Fatface', cursive">Abril Fatface</option>
      <option value="'Quicksand', sans-serif">Quicksand</option>

    </select>
  </div>

  <div>
    <label>フォント太さ:</label>
    <select id="fontWeightSelector">
      <option value="normal">Normal</option>
      <option value="700">Bold</option>
    </select>
  </div>

  <div>
    <label>
      <input type="checkbox" id="textShadowToggle" />
      文字に影をつける
    </label>
  </div>

  <div>
    <label>文字色:</label>
    <input type="color" id="colorPicker" value="#ffffff" />
  </div>

  <div>
    <label>
      <input type="checkbox" id="toggle12Hour" />
      12時間表示（AM/PM）
    </label>
  </div>

  <div>
    <label>
      <input type="checkbox" id="dotShapeToggle"> 丸ドットにする
    </label>
  </div>

  <div>
    <label>
      <input type="checkbox" id="toggleSecondBar">
      秒数バーを非表示にする
    </label>
  </div>

  <div>
    <label><input type="checkbox" id="toggleCpu" /> CPU を非表示にする</label>
  </div>
  <div>
    <label><input type="checkbox" id="toggleGpu" /> GPU を非表示にする</label>
  </div>
  <div>
    <label><input type="checkbox" id="toggleLiq" /> LIQ を非表示にする</label>
  </div>

  <div>
    <label>文字スケール（30–100%）</label>
    <input id="textScale" type="range" min="30" max="100" value="100">
    <span id="textScaleVal">100%</span>
  </div>


  <!-- ===== 背景 ===== -->
  <h3 class="cfg-h">背景</h3>

  <div>
    <label>背景色:</label>
    <input type="color" id="bgColorPicker" value="#000000" />
  </div>

  <div>
    <label>背景画像の設定方法:</label><br/>
    <input type="radio" name="bgMode" value="url" checked /> URLを入力
    <input type="radio" name="bgMode" value="file" /> ファイルを選択
  </div>

  <div id="bgImageURLBox">
    <input type="url" id="bgImageInput" placeholder="https://example.com/image.jpg" style="width: 80%;" />
  </div>

  <div id="bgImageFileBox" style="display: none;">
    <input type="file" id="bgImageFile" accept="image/*" />
  </div>

  <div style="margin-top: 6px;">
    <button id="clearBgImage" type="button">背景画像を削除</button>
  </div>

  <div>
    <label>背景透明度:</label>
    <input type="range" id="bgOpacity" min="0" max="100" value="100" />
  </div>

  <div>
    <label>背景ぼかし:</label>
    <input type="range" id="bgBlur" min="0" max="20" value="0" />
  </div>

  <!-- ===== リセット ===== -->
  <h3 class="cfg-h">リセット</h3>
  <button id="resetSettings" type="button" style="margin-top: 10px;">設定をリセット</button>

</div>


<script src="js/script.js"></script>

</body>
</html>
